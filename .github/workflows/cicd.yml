name: My first pipeline

on: 
    push: 
        branches: ["main"]

jobs:
    build:
        runs-on: ubuntu-latest #macOs, Windows
        steps: 
            - name: Clone the code
              uses: actions/checkout@v4
            - name: Build image
              run:
                docker build -t robpel1/cicd-portfolio .
            - name: Docker login
              uses: docker/login-action@v3
              with:
                username: robpel1
                password: ${{ secrets.DOCKER_PASS}}
            - name: Push image
              run:
                docker push robpel1/cicd-portfolio





        
